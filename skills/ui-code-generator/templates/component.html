<!-- Semantic Component Template -->
<div class="component component--variant" role="region" aria-label="Component Label">
    <!-- Header Section -->
    <header class="component__header">
        <h2 class="component__title">Component Title</h2>
        <p class="component__subtitle">Optional subtitle</p>
    </header>

    <!-- Main Content -->
    <div class="component__content">
        <p>Your content here</p>
    </div>

    <!-- Actions -->
    <footer class="component__footer">
        <button class="button button--primary" type="button" aria-label="Action Label">
            Action
        </button>
    </footer>
</div>

<!-- Accessibility Notes -->
<!-- Use semantic HTML: <button>, <label>, <main>, <nav>, <article> -->
<!-- Include aria-label on buttons without visible text -->
<!-- Include role="region" for custom components -->
<!-- Ensure heading hierarchy: h1 → h2 → h3 (no skips) -->
